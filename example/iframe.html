<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<p>iframe</p>
		<script type="module">
			import bime from '../dist/bime.js'

			function delayedResponse(response, delay=1000) {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve(response)
					}, delay)
				})
			}

			const model = {
				ping: async () => {
					console.log('iframe: ping')
					bi.invoke('pong')
					return await delayedResponse('ping response', 1000)
				},
			}

			const target = window.parent
			const bi = bime(target, model, 'http://127.0.0.1:5500')
		</script>
	</body>
</html>
