<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<p>iframe</p>
		<script type="module">
			import bime from '../dist/bime.js'

			const greetFunction = (name = '', age, friend) => {
				if (name) {
					console.log(`Hello ${name}!`)
				} else {
					console.log('Hello!')
				}
				console.log(`other info: ${age} ${friend}`)
			}

            const data = {
                name: 'Mike',
                age: 24,
            }

			const model = {
				greet: greetFunction,
				age: data.age,
                logName: () => console.log(data.name),
                setName: (name) => {
                    data.name = name
                },
                ping: () => {
                    console.log('iframe: ping')
                    bi.invoke('pong')
                }
			}

			const target = window.parent
			const bi = bime(target, model, "http://127.0.0.1:5500")
		</script>
	</body>
</html>
